    <script>
        function renderWishlist() {
            const container = document.getElementById('wishlistContainer');
            const emptyState = document.getElementById('emptyWishlist');
            const wishlist = FeatureManager.wishlist;

            if (wishlist.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = wishlist.map(id => {
                const bike = bikeData[id];
                if (!bike) return '';
                return `
                    <div class="wishlist-item reveal">
                        <img src="${bike.thumbnail}" alt="${bike.name}">
                        <div class="item-details">
                            <p class="item-family">${bike.family}</p>
                            <h3>${bike.name}</h3>
                            <div class="item-specs">
                                <div class="item-spec"><span>${bike.stats.cylinders}</span> Cyl</div>
                                <div class="item-spec"><span>${bike.stats.capacity}</span> CC</div>
                                <div class="item-spec"><span>${bike.stats.hp}</span> HP</div>
                            </div>
                        </div>
                        <div class="wishlist-actions">
                            <button class="btn-action-small btn-remove" onclick="FeatureManager.toggleWishlist('${id}')">Remove</button>
                            <button class="btn-action-small btn-cart-add" onclick="FeatureManager.moveToCart('${id}')">Move to Cart</button>
                            <button class="btn-action-small btn-cart-add" style="background: var(--color-accent); color: white; border: none;" onclick="FeatureManager.addToCompare('${id}')">Compare</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderWishlist();
        });
        document.addEventListener('productsLoaded', () => {
            renderWishlist();
        });
    </script>
